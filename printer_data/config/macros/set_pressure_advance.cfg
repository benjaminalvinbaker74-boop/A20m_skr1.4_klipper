[gcode_macro SET_PRESSURE_ADVANCE]
rename_existing: SET_PRESSURE_ADVANCE_BASE
gcode:
    # If OrcaSlicer sent an explicit extruder, pass it through normally
    {% if 'EXTRUDER' in params %}
        SET_PRESSURE_ADVANCE_BASE {rawparams}
    {% else %}
        # Otherwise, find the currently active primary extruder name and force-inject it
        {% set active_ext = printer.toolhead.extruder %}
        SET_PRESSURE_ADVANCE_BASE EXTRUDER={active_ext} {rawparams}
    {% endif %}
