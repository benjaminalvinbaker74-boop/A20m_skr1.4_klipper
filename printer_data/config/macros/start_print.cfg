[gcode_macro START_PRINT]
gcode:
	
    # # 1. Fetch your printer's max velocity and scale it down to a safe 40% speed
    # {% set safe_kamp_speed = (printer.toolhead.max_velocity * 0.40) * 60 %}
    
    # # 2. Force-inject this calculated speed directly into the LINE_PURGE macro (KAMP uses mm/min internally for travel_speed)
    # SET_GCODE_VARIABLE MACRO=LINE_PURGE VARIABLE=travel_speed VALUE={safe_kamp_speed}


	
    # 1. Fetch variables sent from OrcaSlicer
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    {% set INITIAL_TOOL = params.INITIAL_TOOL|default(0)|int %}
	
    
    # 2. IMMEDIATELY isolate and select the correct starting tool using your macros
    {% if INITIAL_TOOL == 0 %}
        T0                       ; Calls your T0 macro to link 'extruder'
    {% else %}
        T1                       ; Calls your T1 macro to link 'extruder1'
    {% endif %}
    
        
    # 2. Start heating processes
    M117 Heating bed to {BED_TEMP}C...
    M140 S{BED_TEMP}             ; Set bed temp (no wait)
    M104 S{EXTRUDER_TEMP}		; Set temp to rise as this hotend slow !!!
    #M104 S150                    ; Set nozzle to safe preheat temp to prevent oozing
    M190 S{BED_TEMP}             ; Wait for bed to reach temperature

    
    # 3. Homing and Adaptive Leveling
    M117 Homing and Leveling...
    G28                          ; Home all axes
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN=2

    
    # 4. Final Hotend Heating and Parking
    M117 Heating hotend to {EXTRUDER_TEMP}C...    
    SMART_PARK                   ; KAMP Smart Park near print area while heating
    M109 S{EXTRUDER_TEMP}        ; Heat nozzle to printing temp and wait
    
    # 7. Final tool verification check right before extrusion
    {% if INITIAL_TOOL == 0 %} T0 {% else %} T1 {% endif %}
    
    M83                          ; Force relative extrusion mode
    M220 S100                    ; Reset Feedrate
    M221 S100                    ; Reset Flowrate
    G92 E0                       ; Reset Extruder
    M107                         ; Turn off fan
    
    
    
    # 6. Adaptive Purge Execution
	M117 Purging...    
    LINE_PURGE                   ; KAMP Line Purge
 
#     ;<-- Use this if you included KAMP_Settings.cfg
#     ;VORON_PURGE; <-- VORON LOGO
# 	M117 Purging...    
#     Line_purge;
#     LINE_PURGE;   
#     ;Voron_purge;
    G92 E0                       ; Reset Extruder again

    # 7. Start Print
	#G1 Z5 F300                  ; Lift nozzle safely
	M117 Printing...




